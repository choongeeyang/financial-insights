site_name: FinSight API Documentation
site_description: Developer documentation for the FinSight financial data and AI platform — covering architecture, APIs, data pipelines, AI systems, and MLOps.
site_url: https://ONGKOKRHUI.github.io/financial-insights
copyright: "&copy; 2026 FinSight API"

repo_name: ONGKOKRHUI/financial-insights
repo_url: https://github.com/ONGKOKRHUI/financial-insights
edit_uri: edit/main/docs/

# ---------------------------------------------------------------------------
# Theme
# ---------------------------------------------------------------------------
theme:
  name: material

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode

  font:
    text: Inter
    code: JetBrains Mono

  logo: assets/logo.png
  favicon: assets/favicon.png

  features:
    - navigation.tabs           # Top-level tabs in the header
    - navigation.tabs.sticky    # Keep tabs visible while scrolling
    - navigation.sections       # Collapsible sidebar sections
    - navigation.expand         # Expand sections by default
    - navigation.top            # "Back to top" button
    - navigation.path           # Breadcrumb navigation
    - navigation.indexes        # Section index pages
    - toc.follow                # TOC auto-scrolls with the page
    - search.highlight          # Highlight search terms in results
    - search.share              # Share search queries via URL
    - search.suggest            # Auto-suggest while typing
    - content.code.copy         # Copy button on code blocks
    - content.code.annotate     # Inline code annotations
    - content.action.edit       # "Edit this page" button
    - content.action.view       # "View source" button
    - content.tabs.link         # Linked content tabs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ONGKOKRHUI/financial-insights
      name: FinSight on GitHub

  # Status badges used in admonitions across docs
  status:
    new: Recently added
    deprecated: Deprecated

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

# ---------------------------------------------------------------------------
# Navigation
# ---------------------------------------------------------------------------
nav:
  - Home: index.md

  - Platform Overview:
      - platform-overview/index.md
      - Overview: platform-overview/overview.md

  - Architecture:
      - architecture/index.md
      - System Architecture: architecture/system-architecture.md
      - Data Pipeline: architecture/data-pipeline.md
      - RAG Architecture: architecture/rag-architecture.md
      - Agentic Workflow: architecture/agentic-workflow.md

  - Data Engineering:
      - data-engineering/index.md
      - Scraping System: data-engineering/scraping-system.md
      - PDF Parsing: data-engineering/pdf-parsing.md
      - ETL Pipeline: data-engineering/etl-pipeline.md

  - Backend:
      - backend/index.md
      - FastAPI Architecture: backend/fastapi-architecture.md
      - Services: backend/services.md
      - Database Schema: backend/database-schema.md

  - API Reference:
      - api-reference/index.md
      - Overview: api-reference/overview.md
      - Authentication: api-reference/authentication.md
      - Endpoints: api-reference/endpoints.md
      - Examples: api-reference/examples.md

  - Frontend:
      - frontend/index.md
      - Architecture: frontend/architecture.md
      - State Management: frontend/state-management.md
      - Dashboard: frontend/dashboard.md

  - AI Systems:
      - ai-systems/index.md
      - RAG Pipeline: ai-systems/rag-pipeline.md
      - LLM Analysis: ai-systems/llm-analysis.md
      - Agentic System: ai-systems/agentic-system.md

  - MLOps:
      - mlops/index.md
      - Model Training: mlops/model-training.md
      - Experiment Tracking: mlops/experiment-tracking.md
      - Deployment: mlops/deployment.md

  - System Design:
      - system-design/index.md
      - Scaling: system-design/scaling.md
      - Reliability: system-design/reliability.md
      - Data Quality: system-design/data-quality.md

  - Development:
      - development/index.md
      - Environment Setup: development/environment-setup.md
      - Running the Project: development/running-the-project.md
      - Contributing: development/contributing.md

# ---------------------------------------------------------------------------
# Markdown extensions
# ---------------------------------------------------------------------------
markdown_extensions:
  # Code highlighting
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite

  # Mermaid diagrams via superfences
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.mark
  - pymdownx.tilde

  # Standard extensions
  - admonition
  - abbr
  - attr_list 
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: datetime
      enable_creation_date: true