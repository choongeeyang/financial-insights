# render.yaml
# This file tells Render how to deploy and run the application.
# Render reads this configuration automatically when the repository is connected.

services:
  - type: web               # Defines the service type. "web" means an HTTP server that receives web requests.
    name: finsight-api     # The name of the service as it appears in the Render dashboard.

    runtime: python        # Specifies the runtime environment. Render will create a Python environment.
    pythonVersion: "3.11"
    
    # Command executed during the build phase of deployment.
    # Typically used to install dependencies required by the application.
    buildCommand: |
      python -m pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt

    # Command used to start the application once the build is complete.
    # uvicorn is an ASGI server used to run FastAPI apps.
    # backend.main:app means:
    #   backend/main.py → module
    #   app → FastAPI instance inside that file
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    envVars:
      # Environment variable used by the application (e.g., for CORS configuration).
      # ALLOWED_ORIGINS typically defines which frontend domains can access the API.
      - key: ALLOWED_ORIGINS

        # sync: false means the value will NOT be pulled from this YAML file.
        # Instead, it must be manually configured in the Render dashboard.
        # This is useful for secrets or environment-specific configuration.
        sync: false

    # When set to true, Render will automatically redeploy the service
    # whenever changes are pushed to the connected Git repository.
    autoDeploy: true